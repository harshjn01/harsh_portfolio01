<svg width="640" height="400" viewBox="0 0 640 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="640" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12081f"/>
      <stop offset="0.55" stop-color="#1a0f2e"/>
      <stop offset="1" stop-color="#0d0a1c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fire" x1="320" y1="60" x2="320" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="0.4" stop-color="#d946ef"/>
      <stop offset="0.72" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="fire2" x1="320" y1="90" x2="320" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="0.6" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="640" height="400" fill="url(#bg)"/>
  <rect width="640" height="400" fill="url(#glow)"/>

  <!-- phoenix -->
  <g filter="url(#soft)">
    <!-- right wing (mirrored group draws both) -->
    <g>
      <!-- LEFT WING -->
      <path d="M320 150
               C 268 128, 214 120, 168 138
               C 205 150, 232 168, 250 196
               C 210 186, 170 190, 138 214
               C 182 220, 214 236, 238 262
               C 208 262, 178 272, 156 296
               C 214 288, 268 268, 300 232
               C 312 214, 318 186, 320 150 Z"
            fill="url(#fire)"/>
      <!-- RIGHT WING (mirror) -->
      <path d="M320 150
               C 372 128, 426 120, 472 138
               C 435 150, 408 168, 390 196
               C 430 186, 470 190, 502 214
               C 458 220, 426 236, 402 262
               C 432 262, 462 272, 484 296
               C 426 288, 372 268, 340 232
               C 328 214, 322 186, 320 150 Z"
            fill="url(#fire)"/>
    </g>

    <!-- body / tail flame -->
    <path d="M320 132
             C 332 168, 346 196, 344 236
             C 342 272, 330 300, 320 330
             C 310 300, 298 272, 296 236
             C 294 196, 308 168, 320 132 Z"
          fill="url(#fire2)"/>

    <!-- head + beak -->
    <path d="M320 96
             C 336 104, 344 120, 340 138
             C 334 150, 326 156, 320 158
             C 314 156, 306 150, 300 138
             C 296 120, 304 104, 320 96 Z"
          fill="url(#fire2)"/>
    <path d="M320 108 L336 118 L320 124 Z" fill="#fbbf24"/>
    <!-- eye spark -->
    <circle cx="320" cy="120" r="4.5" fill="#ffffff"/>
  </g>

  <!-- wordmark -->
  <text x="320" y="360" text-anchor="middle"
        font-family="'Segoe UI', Inter, Arial, sans-serif"
        font-size="46" font-weight="800" letter-spacing="6" fill="#ffffff">PHOENIX</text>
  <text x="320" y="384" text-anchor="middle"
        font-family="'Segoe UI', Inter, Arial, sans-serif"
        font-size="14" font-weight="600" letter-spacing="8" fill="#a78bfa">AI · CHATBOT</text>
</svg>
